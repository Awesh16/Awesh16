<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="spark">
      <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#greenGlow)"/>
      <path d="M-20,0 L20,0 M0,-20 L0,20 M-14,-14 L14,14 M-14,14 L14,-14" stroke="#ffffff" stroke-width="3" filter="url(#greenGlow)"/>
    </g>
    <g id="bigSpark">
      <circle cx="0" cy="0" r="16" fill="#ffffff" filter="url(#redGlow)"/>
      <path d="M-40,0 L40,0 M0,-40 L0,40 M-28,-28 L28,28 M-28,28 L28,-28" stroke="#ffffff" stroke-width="5" filter="url(#greenGlow)"/>
    </g>
  </defs>

  <g opacity="0.6">
    <rect x="0" y="80" width="60" height="15" fill="#00ff41">
      <animate attributeName="x" from="-100" to="1100" dur="8s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="0" y="160" width="120" height="15" fill="#00ff41">
      <animate attributeName="x" from="-150" to="1100" dur="6s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite" begin="1s"/>
    </rect>
     <rect x="0" y="240" width="90" height="15" fill="#00ff41">
      <animate attributeName="x" from="-120" to="1100" dur="10s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="10s" repeatCount="indefinite" begin="3s"/>
    </rect>

    <rect x="0" y="120" width="40" height="15" fill="#ff4444">
      <animate attributeName="x" from="-100" to="1100" dur="9s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;1;0.2;1;0" dur="9s" repeatCount="indefinite" begin="2s"/>
    </rect>
     <rect x="0" y="280" width="150" height="15" fill="#ff4444">
      <animate attributeName="x" from="-200" to="1100" dur="7s" repeatCount="indefinite" begin="5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" begin="5s"/>
    </rect>
  </g>

  <g transform="translate(500, 210)">
    <g opacity="0">
      <animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.08; 1" dur="10s" begin="5s" repeatCount="indefinite"/>
      <use href="#bigSpark"/>
    </g>
  </g>

  <g transform="translate(75, 210)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="0s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>
  <g transform="translate(925, 210)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="0s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>

  <g transform="translate(300, 15)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="2.5s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>
  <g transform="translate(700, 405)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="2.5s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>

  <g transform="translate(300, 405)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="7.5s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>
  <g transform="translate(700, 15)">
    <g opacity="0"><animate attributeName="opacity" values="0; 1; 0; 0" keyTimes="0; 0.02; 0.06; 1" dur="10s" begin="7.5s" repeatCount="indefinite"/><use href="#spark"/></g>
  </g>

  <g>
    <animateMotion path="M 100,210 L 300,40 L 475,210 L 300,380 Z" dur="10s" repeatCount="indefinite" />
    <circle cx="0" cy="0" r="25" fill="#ffde59" stroke="#1a1d21" stroke-width="2"/>
    <circle cx="-8" cy="-6" r="3" fill="#1a1d21"/>
    <circle cx="8" cy="-6" r="3" fill="#1a1d21"/>
    <path d="M -12,4 Q 0,16 12,4" fill="none" stroke="#1a1d21" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g>
    <animateMotion path="M 900,210 L 700,380 L 525,210 L 700,40 Z" dur="10s" repeatCount="indefinite" />
    <circle cx="0" cy="0" r="25" fill="#ff66b2" stroke="#1a1d21" stroke-width="2"/>
    <circle cx="-8" cy="-4" r="3" fill="#1a1d21"/>
    <circle cx="8" cy="-4" r="3" fill="#1a1d21"/>
    <path d="M -12,14 Q 0,4 12,14" fill="none" stroke="#1a1d21" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g text-anchor="middle" font-family="'Press Start 2P', 'VT323', 'Courier New', Courier, monospace" letter-spacing="2">
    
    <text x="500" y="140" font-size="34" font-weight="900" fill="#ffffff" filter="url(#greenGlow)" text-transform="uppercase">MD. AWESH RAZA QUADRI</text>
    
    <text x="500" y="195" font-size="22" font-weight="700" fill="#ff4444" filter="url(#redGlow)" text-transform="uppercase">// Aspiring AI &amp; ML Quant</text>
    
    <path d="M 350 240 L 650 240 L 670 250 L 330 250 Z" fill="#1a1d21" stroke="#00ff41" stroke-width="1"/>

    <text x="500" y="300" font-size="16" font-weight="600" fill="#00ff41" text-transform="uppercase">CSE '29 @OUTR | DS &amp; ML '29 @IITM BS</text>
    <text x="500" y="330" font-size="14" fill="#8b949e" text-transform="uppercase">Focused on Competitive Programming &amp; Databases</text>
  </g>
</svg>
