<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <!-- Background gradient: deep space -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="40%" stop-color="#0d1224"/>
      <stop offset="100%" stop-color="#0f0818"/>
    </linearGradient>

    <!-- Cinematic vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="magentaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ff2d75" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="whiteBloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Horizontal grid line gradient (fades at edges) -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridFadeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Orb for animated emoji faces -->
    <radialGradient id="orbYellow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#fff7a0"/>
      <stop offset="60%" stop-color="#ffde59"/>
      <stop offset="100%" stop-color="#e6a800"/>
    </radialGradient>
    <radialGradient id="orbPink" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffb3d9"/>
      <stop offset="60%" stop-color="#ff66b2"/>
      <stop offset="100%" stop-color="#cc3385"/>
    </radialGradient>

    <!-- Lens flare streak -->
    <linearGradient id="flareGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- =================== BACKGROUND =================== -->
  <rect width="1000" height="420" fill="url(#bgGrad)"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.35">
    <line x1="0" y1="105" x2="1000" y2="105" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1000" y2="210" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1000" y2="315" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
  </g>

  <!-- =================== STARFIELD =================== -->
  <g opacity="0.7">
    <circle cx="82" cy="38" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="190" cy="72" r="0.8" fill="#b0d4ff"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="330" cy="25" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.1;1;0.1" dur="5s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="470" cy="55" r="0.7" fill="#ffe0b2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.8s" repeatCount="indefinite" begin="2s"/></circle>
    <circle cx="620" cy="30" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="780" cy="50" r="0.9" fill="#c8e6ff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite" begin="1.5s"/></circle>
    <circle cx="910" cy="35" r="1.1" fill="#ffffff"><animate attributeName="opacity" values="0.15;0.9;0.15" dur="5.5s" repeatCount="indefinite" begin="3s"/></circle>
    <circle cx="55" cy="130" r="0.6" fill="#ffd1dc"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="150" cy="310" r="0.9" fill="#ffffff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="6s" repeatCount="indefinite" begin="2.5s"/></circle>
    <circle cx="870" cy="180" r="0.7" fill="#b0d4ff"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="940" cy="340" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4.8s" repeatCount="indefinite" begin="4s"/></circle>
    <circle cx="40" cy="380" r="0.8" fill="#ffe0b2"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5.2s" repeatCount="indefinite" begin="1.8s"/></circle>
    <circle cx="720" cy="390" r="1" fill="#ffffff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite" begin="0.6s"/></circle>
    <circle cx="300" cy="395" r="0.6" fill="#c8e6ff"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.4s" repeatCount="indefinite" begin="2.2s"/></circle>
    <circle cx="560" cy="400" r="0.9" fill="#ffffff"><animate attributeName="opacity" values="0.15;0.85;0.15" dur="5.8s" repeatCount="indefinite" begin="3.5s"/></circle>
    <circle cx="430" cy="15" r="0.7" fill="#ffd1dc"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.6s" repeatCount="indefinite" begin="1.3s"/></circle>
    <circle cx="960" cy="90" r="0.8" fill="#ffffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="25" cy="250" r="1" fill="#b0d4ff"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="5.4s" repeatCount="indefinite" begin="2.8s"/></circle>
    <circle cx="850" cy="280" r="0.6" fill="#ffffff"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.1s" repeatCount="indefinite" begin="1.6s"/></circle>
    <circle cx="680" cy="75" r="0.9" fill="#ffe0b2"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="6.2s" repeatCount="indefinite" begin="4.5s"/></circle>
  </g>

  <!-- =================== SCAN LINE =================== -->
  <rect x="0" y="0" width="1000" height="100" fill="url(#scanGrad)" opacity="0.5">
    <animate attributeName="y" from="-100" to="420" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- =================== ENERGY TRACERS =================== -->
  <g opacity="0.5">
    <!-- Cyan tracers -->
    <rect x="0" y="85" width="80" height="2" fill="#00e5ff" rx="1">
      <animate attributeName="x" from="-120" to="1100" dur="7s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="7s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="0" y="175" width="140" height="2" fill="#00e5ff" rx="1">
      <animate attributeName="x" from="-180" to="1100" dur="5.5s" repeatCount="indefinite" begin="1.5s"/>
      <animate attributeName="opacity" values="0;0.7;0.7;0" dur="5.5s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <rect x="0" y="345" width="100" height="2" fill="#00e5ff" rx="1">
      <animate attributeName="x" from="-130" to="1100" dur="9s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="9s" repeatCount="indefinite" begin="3s"/>
    </rect>
    <!-- Magenta tracers -->
    <rect x="0" y="130" width="50" height="2" fill="#ff2d75" rx="1">
      <animate attributeName="x" from="1100" to="-100" dur="8s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.7;0.3;0.7;0" dur="8s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <rect x="0" y="290" width="170" height="2" fill="#ff2d75" rx="1">
      <animate attributeName="x" from="1100" to="-200" dur="6.5s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="6.5s" repeatCount="indefinite" begin="4s"/>
    </rect>
  </g>

  <!-- =================== HUD CORNER BRACKETS =================== -->
  <g stroke="#00e5ff" stroke-width="1.5" fill="none" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
    <!-- Top-left -->
    <polyline points="30,60 30,30 60,30"/>
    <!-- Top-right -->
    <polyline points="940,30 970,30 970,60"/>
    <!-- Bottom-left -->
    <polyline points="30,360 30,390 60,390"/>
    <!-- Bottom-right -->
    <polyline points="940,390 970,390 970,360"/>
  </g>

  <!-- Inner HUD frame -->
  <g stroke="#ff2d75" stroke-width="0.8" fill="none" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="5s" repeatCount="indefinite" begin="1s"/>
    <polyline points="50,70 50,50 70,50"/>
    <polyline points="930,50 950,50 950,70"/>
    <polyline points="50,350 50,370 70,370"/>
    <polyline points="930,370 950,370 950,350"/>
  </g>

  <!-- =================== PULSING CENTER RINGS =================== -->
  <g transform="translate(500, 210)">
    <circle cx="0" cy="0" r="130" fill="none" stroke="#00e5ff" stroke-width="0.5" opacity="0.15">
      <animate attributeName="r" values="120;145;120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.2;0.1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#ff2d75" stroke-width="0.4" opacity="0.1">
      <animate attributeName="r" values="155;175;155" dur="8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.05;0.15;0.05" dur="8s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- =================== SPARK EFFECTS =================== -->
  <!-- Center burst -->
  <g transform="translate(500, 210)" opacity="0">
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.02;0.08;1" dur="12s" begin="5s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="10" fill="#ffffff" filter="url(#whiteBloom)"/>
    <path d="M-25,0 L25,0 M0,-25 L0,25" stroke="#ffffff" stroke-width="2" filter="url(#cyanGlow)"/>
  </g>

  <!-- Corner sparks -->
  <g transform="translate(80, 210)" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="4" fill="#00e5ff" filter="url(#cyanGlow)"/>
  </g>
  <g transform="translate(920, 210)" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="0s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="4" fill="#00e5ff" filter="url(#cyanGlow)"/>
  </g>
  <g transform="translate(300, 20)" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="2.5s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="3" fill="#ff2d75" filter="url(#magentaGlow)"/>
  </g>
  <g transform="translate(700, 400)" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="2.5s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="3" fill="#ff2d75" filter="url(#magentaGlow)"/>
  </g>
  <g transform="translate(300, 400)" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="7.5s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#whiteBloom)"/>
  </g>
  <g transform="translate(700, 20)" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0;0" keyTimes="0;0.02;0.06;1" dur="10s" begin="7.5s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" filter="url(#whiteBloom)"/>
  </g>

  <!-- =================== ANIMATED EMOJI ORBS =================== -->
  <!-- Yellow smiley orb (with cinematic glow trail) -->
  <g>
    <animateMotion path="M 100,210 L 300,50 L 475,210 L 300,370 Z" dur="12s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="22" fill="url(#orbYellow)" filter="url(#goldGlow)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="24;28;24" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-7" cy="-5" r="2.5" fill="#1a1d21"/>
    <circle cx="7" cy="-5" r="2.5" fill="#1a1d21"/>
    <path d="M -10,4 Q 0,14 10,4" fill="none" stroke="#1a1d21" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Pink frown orb (with cinematic glow trail) -->
  <g>
    <animateMotion path="M 900,210 L 700,370 L 525,210 L 700,50 Z" dur="12.7s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="22" fill="url(#orbPink)" filter="url(#magentaGlow)"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#ff2d75" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="24;28;24" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-7" cy="-4" r="2.5" fill="#1a1d21"/>
    <circle cx="7" cy="-4" r="2.5" fill="#1a1d21"/>
    <path d="M -10,12 Q 0,4 10,12" fill="none" stroke="#1a1d21" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- =================== LENS FLARE =================== -->
  <rect x="0" y="195" width="1000" height="4" fill="url(#flareGrad)" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0;0;0" keyTimes="0;0.08;0.16;0.5;1" dur="10s" repeatCount="indefinite" begin="3s"/>
  </rect>

  <!-- =================== TEXT CONTENT =================== -->
  <g text-anchor="middle" font-family="'Inter', 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" letter-spacing="1">

    <!-- Name: cinematic title with layered glow -->
    <text x="500" y="145" font-size="36" font-weight="800" fill="#ffffff" filter="url(#cyanGlow)" letter-spacing="6">MD. AWESH RAZA QUADRI</text>

    <!-- Subtitle -->
    <text x="500" y="198" font-size="20" font-weight="600" fill="#ff2d75" filter="url(#magentaGlow)" letter-spacing="3">// ASPIRING AI &amp; ML QUANT</text>

    <!-- Divider bar -->
    <rect x="350" y="218" width="300" height="1" fill="#00e5ff" opacity="0.4" rx="1">
      <animate attributeName="width" values="280;320;280" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="360;340;360" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom HUD dot accents -->
    <circle cx="340" cy="222" r="2" fill="#00e5ff" opacity="0.5" filter="url(#softGlow)"/>
    <circle cx="660" cy="222" r="2" fill="#00e5ff" opacity="0.5" filter="url(#softGlow)"/>

    <!-- Education line -->
    <text x="500" y="268" font-size="15" font-weight="500" fill="#00e5ff" filter="url(#softGlow)" letter-spacing="2">CSE '29 @OUTR | DS &amp; ML '29 @IITM BS</text>

    <!-- Focus line -->
    <text x="500" y="298" font-size="13" font-weight="400" fill="#7a8599" letter-spacing="1.5">FOCUSED ON COMPETITIVE PROGRAMMING &amp; DATABASES</text>

    <!-- Small decorative HUD text -->
    <text x="80" y="405" font-size="8" font-weight="400" fill="#2a3040" letter-spacing="2" font-family="monospace">SYS::ONLINE</text>
    <text x="920" y="405" font-size="8" font-weight="400" fill="#2a3040" letter-spacing="2" font-family="monospace">v2.0_CINEMATIC</text>
  </g>

  <!-- =================== VIGNETTE OVERLAY =================== -->
  <rect width="1000" height="420" fill="url(#vignette)" opacity="0.55"/>
</svg>
