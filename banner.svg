<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="ballGlowGreen" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
    <filter id="ballGlowRed" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <g opacity="0.6">
    <rect x="0" y="80" width="60" height="15" fill="#00ff41">
      <animate attributeName="x" from="-100" to="1100" dur="8s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="0" y="160" width="120" height="15" fill="#00ff41">
      <animate attributeName="x" from="-150" to="1100" dur="6s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite" begin="1s"/>
    </rect>
     <rect x="0" y="240" width="90" height="15" fill="#00ff41">
      <animate attributeName="x" from="-120" to="1100" dur="10s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="10s" repeatCount="indefinite" begin="3s"/>
    </rect>

    <rect x="0" y="120" width="40" height="15" fill="#ff4444">
      <animate attributeName="x" from="-100" to="1100" dur="9s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;1;0.2;1;0" dur="9s" repeatCount="indefinite" begin="2s"/>
    </rect>
     <rect x="0" y="280" width="150" height="15" fill="#ff4444">
      <animate attributeName="x" from="-200" to="1100" dur="7s" repeatCount="indefinite" begin="5s"/>
      <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" begin="5s"/>
    </rect>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="60,0; 940,0; 60,0" dur="7s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,60; 0,360; 0,60" dur="5s" repeatCount="indefinite" />
      
      <circle cx="0" cy="0" r="55" fill="#00ff41" filter="url(#ballGlowGreen)" opacity="0.8"/>
      
      <circle cx="0" cy="0" r="50" fill="#ffde59" stroke="#1a1d21" stroke-width="6"/>
      <path d="M -35,-15 L -10,-5 L -20,-30 Z" fill="#ffffff" stroke="#1a1d21" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 35,-15 L 10,-5 L 20,-30 Z" fill="#ffffff" stroke="#1a1d21" stroke-width="3" stroke-linejoin="round"/>
      <path d="M -40,5 Q 0,60 40,5 Z" fill="#1a1d21" />
      <path d="M -40,5 L -27,22 L -14,5 L 0,24 L 14,5 L 27,22 L 40,5 Z" fill="#ffffff" />
      <path d="M -25,32 L -15,20 L -5,38 L 5,20 L 15,38 L 25,32 Q 0,48 -25,32 Z" fill="#ffffff" />
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="940,0; 60,0; 940,0" dur="9s" repeatCount="indefinite" />
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,360; 0,60; 0,360" dur="6s" repeatCount="indefinite" />
      
      <circle cx="0" cy="0" r="55" fill="#ff4444" filter="url(#ballGlowRed)" opacity="0.8"/>

      <circle cx="0" cy="0" r="50" fill="#ff66b2" stroke="#1a1d21" stroke-width="6"/>
      <path d="M -35,-15 L -10,-5 L -20,-30 Z" fill="#ffffff" stroke="#1a1d21" stroke-width="3" stroke-linejoin="round"/>
      <path d="M 35,-15 L 10,-5 L 20,-30 Z" fill="#ffffff" stroke="#1a1d21" stroke-width="3" stroke-linejoin="round"/>
      <path d="M -40,10 Q 0,-35 40,10 Z" fill="#1a1d21" />
      <path d="M -40,10 L -27,-12 L -14,10 L 0,-16 L 14,10 L 27,-12 L 40,10 Z" fill="#ffffff" />
      <path d="M -25,-2 L -15,10 L -5,-12 L 5,10 L 15,-12 L 25,-2 Q 0,-20 -25,-2 Z" fill="#ffffff" />
    </g>
  </g>

  <g text-anchor="middle" font-family="Consolas, Monaco, 'Courier New', monospace" letter-spacing="1">
    
    <text x="500" y="140" font-size="38" font-weight="900" fill="#ffffff" filter="url(#greenGlow)">Md. Awesh Raza Quadri</text>
    
    <text x="500" y="195" font-size="24" font-weight="700" fill="#ff4444" filter="url(#redGlow)">// Aspiring AI &amp; ML Quant</text>
    
    <path d="M 350 240 L 650 240 L 670 250 L 330 250 Z" fill="#1a1d21" stroke="#00ff41" stroke-width="1"/>

    <text x="500" y="300" font-size="18" font-weight="600" fill="#00ff41">CSE '29 @OUTR | DS and ML '29 @IITM BS</text>
    <text x="500" y="330" font-size="16" font-style="italic" fill="#8b949e">Focused on Competitive Programming &amp; Managing Databases</text>
  </g>
</svg>
