<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <!-- Cinematic vignette (subtle, transparent center) -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </radialGradient>

    <!-- Hacker blur/focus animation filter for main title -->
    <filter id="hackerBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0" result="blur">
        <animate attributeName="stdDeviation" values="0;2.5;0;0;4;0;0;0;1.5;0" dur="5s" repeatCount="indefinite"/>
      </feGaussianBlur>
    </filter>

    <!-- Chromatic aberration / glitch filter for subtitle -->
    <filter id="glitch" x="-5%" y="-5%" width="110%" height="110%">
      <feOffset in="SourceGraphic" dx="2" dy="0" result="red">
        <animate attributeName="dx" values="2;-1;3;0;-2;1;0" dur="3s" repeatCount="indefinite"/>
      </feOffset>
      <feOffset in="SourceGraphic" dx="-2" dy="0" result="blue">
        <animate attributeName="dx" values="-2;1;-3;0;2;-1;0" dur="3s" repeatCount="indefinite"/>
      </feOffset>
      <feFlood flood-color="#ff2d75" flood-opacity="0.7" result="redColor"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.7" result="blueColor"/>
      <feComposite in="redColor" in2="red" operator="in" result="redOut"/>
      <feComposite in="blueColor" in2="blue" operator="in" result="blueOut"/>
      <feMerge>
        <feMergeNode in="redOut"/>
        <feMergeNode in="blueOut"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for info text -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan neon glow -->
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Green terminal glow -->
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Ball glow filter -->
    <filter id="ballGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Collision burst filter -->
    <filter id="collisionGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pixelated pattern for retro overlay -->
    <pattern id="pixelGrid" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <rect width="3" height="3" fill="rgba(255,255,255,0.012)"/>
    </pattern>

    <!-- CRT scanline pattern -->
    <pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <rect width="4" height="1" fill="rgba(0,0,0,0.15)"/>
    </pattern>

    <!-- Scan line sweep gradient -->
    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="45%" stop-color="#39ff14" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#39ff14" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>

    <!-- Horizontal grid line gradient (fades at edges) -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="20%" stop-color="#39ff14" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.12"/>
      <stop offset="80%" stop-color="#39ff14" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gridFadeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0"/>
      <stop offset="20%" stop-color="#39ff14" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#39ff14" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </linearGradient>

    <!-- Lens flare streak -->
    <linearGradient id="flareGrad" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#39ff14" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#39ff14" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#39ff14" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- =================== TRANSPARENT BACKGROUND =================== -->
  <!-- No solid background — GitHub's own dark background shows through -->
  <rect width="1000" height="420" fill="transparent"/>

  <!-- =================== PIXEL GRID OVERLAY =================== -->
  <rect width="1000" height="420" fill="url(#pixelGrid)"/>

  <!-- =================== SUBTLE GRID =================== -->
  <g opacity="0.25">
    <line x1="0" y1="84" x2="1000" y2="84" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="168" x2="1000" y2="168" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="252" x2="1000" y2="252" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="0" y1="336" x2="1000" y2="336" stroke="url(#gridFade)" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="420" stroke="url(#gridFadeV)" stroke-width="0.5"/>
  </g>

  <!-- =================== SCAN LINE SWEEP =================== -->
  <rect x="0" y="0" width="1000" height="80" fill="url(#scanGrad)" opacity="0.5">
    <animate attributeName="y" from="-80" to="420" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- =================== ENERGY TRACERS =================== -->
  <g opacity="0.35">
    <rect x="0" y="90" width="60" height="1" fill="#39ff14" rx="1">
      <animate attributeName="x" from="-100" to="1100" dur="8s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="opacity" values="0;0.6;0.6;0" dur="8s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="0" y="195" width="100" height="1" fill="#39ff14" rx="1">
      <animate attributeName="x" from="-140" to="1100" dur="6s" repeatCount="indefinite" begin="2s"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <rect x="0" y="340" width="80" height="1" fill="#39ff14" rx="1">
      <animate attributeName="x" from="-120" to="1100" dur="10s" repeatCount="indefinite" begin="4s"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="10s" repeatCount="indefinite" begin="4s"/>
    </rect>
    <rect x="0" y="150" width="40" height="1" fill="#00e5ff" rx="1">
      <animate attributeName="x" from="1100" to="-80" dur="9s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0;0.5;0;0.5;0" dur="9s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <rect x="0" y="300" width="120" height="1" fill="#00e5ff" rx="1">
      <animate attributeName="x" from="1100" to="-160" dur="7s" repeatCount="indefinite" begin="3s"/>
      <animate attributeName="opacity" values="0;0.4;0" dur="7s" repeatCount="indefinite" begin="3s"/>
    </rect>
  </g>

  <!-- =================== HUD CORNER BRACKETS =================== -->
  <g stroke="#39ff14" stroke-width="1.5" fill="none" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    <polyline points="20,50 20,20 50,20"/>
    <polyline points="950,20 980,20 980,50"/>
    <polyline points="20,370 20,400 50,400"/>
    <polyline points="950,400 980,400 980,370"/>
  </g>

  <!-- Inner HUD frame -->
  <g stroke="#00e5ff" stroke-width="0.6" fill="none" opacity="0.2">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" repeatCount="indefinite" begin="1s"/>
    <polyline points="40,60 40,40 60,40"/>
    <polyline points="940,40 960,40 960,60"/>
    <polyline points="40,360 40,380 60,380"/>
    <polyline points="940,380 960,380 960,360"/>
  </g>

  <!-- =================== BLINKING CURSOR EFFECT =================== -->
  <rect x="60" y="68" width="8" height="14" fill="#39ff14" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0;0.7;0" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- =================== FLOATING DATA PARTICLES =================== -->
  <g opacity="0.4">
    <circle cx="120" cy="100" r="1.5" fill="#39ff14">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="100;90;100" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="130" r="1" fill="#00e5ff">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="cy" values="130;120;130" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="350" r="1.2" fill="#39ff14">
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="800" cy="370" r="1" fill="#00e5ff">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="3.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="500" cy="50" r="1.3" fill="#39ff14">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.5s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="350" cy="380" r="0.8" fill="#39ff14">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <circle cx="650" cy="70" r="1.1" fill="#00e5ff">
      <animate attributeName="opacity" values="0.15;0.6;0.15" dur="5.5s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
  </g>

  <!-- =================== TEXT CONTENT =================== -->
  <!-- Main Name — abstract monospace font with animated hacker blur -->
  <g text-anchor="middle">
    <text x="500" y="155" font-family="'Courier New', 'Lucida Console', monospace" font-size="48" font-weight="700" fill="#39ff14" filter="url(#hackerBlur)" letter-spacing="5" opacity="0.95">MD. AWESH RAZA QUADRI</text>
    <!-- Chromatic ghost layers for retro depth -->
    <text x="502" y="155" font-family="'Courier New', 'Lucida Console', monospace" font-size="48" font-weight="700" fill="#00e5ff" letter-spacing="5" opacity="0.12">
      <animate attributeName="x" values="502;499;503;500;502" dur="4s" repeatCount="indefinite"/>
      MD. AWESH RAZA QUADRI
    </text>
    <text x="498" y="155" font-family="'Courier New', 'Lucida Console', monospace" font-size="48" font-weight="700" fill="#ff2d75" letter-spacing="5" opacity="0.1">
      <animate attributeName="x" values="498;501;497;500;498" dur="4s" repeatCount="indefinite"/>
      MD. AWESH RAZA QUADRI
    </text>
  </g>

  <!-- Subtitle — glitch chromatic aberration -->
  <text x="500" y="215" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="22" font-weight="400" fill="#00e5ff" filter="url(#glitch)" letter-spacing="5" opacity="0.85">&gt;_ ASPIRING AI &amp; ML QUANT</text>

  <!-- Divider bar -->
  <g text-anchor="middle">
    <rect x="370" y="238" width="260" height="1" fill="#39ff14" opacity="0.25" rx="1">
      <animate attributeName="width" values="240;280;240" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="x" values="380;360;380" dur="4s" repeatCount="indefinite"/>
    </rect>
    <circle cx="365" cy="239" r="1.5" fill="#39ff14" opacity="0.35" filter="url(#softGlow)"/>
    <circle cx="635" cy="239" r="1.5" fill="#39ff14" opacity="0.35" filter="url(#softGlow)"/>
  </g>

  <!-- Education line -->
  <text x="500" y="278" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="17" font-weight="400" fill="#58a6ff" filter="url(#softGlow)" letter-spacing="2" opacity="0.8">CSE '29 @OUTR | DS &amp; ML '29 @IITM BS</text>

  <!-- Focus line -->
  <text x="500" y="312" text-anchor="middle" font-family="'Courier New', 'Lucida Console', monospace" font-size="15" font-weight="400" fill="#8b949e" letter-spacing="1.5" opacity="0.65">FOCUSED ON COMPETITIVE PROGRAMMING &amp; DATABASES</text>

  <!-- Decorative HUD text (hacker terminal style) -->
  <text x="65" y="400" font-family="'Courier New', 'Lucida Console', monospace" font-size="8" font-weight="400" fill="#39ff14" letter-spacing="2" opacity="0.25">SYS::ACTIVE</text>
  <text x="880" y="400" font-family="'Courier New', 'Lucida Console', monospace" font-size="8" font-weight="400" fill="#39ff14" letter-spacing="2" opacity="0.25">v3.0_RETRO</text>
  <text x="65" y="30" font-family="'Courier New', 'Lucida Console', monospace" font-size="7" font-weight="400" fill="#8b949e" letter-spacing="1" opacity="0.2">0x4157455348</text>
  <text x="880" y="30" font-family="'Courier New', 'Lucida Console', monospace" font-size="7" font-weight="400" fill="#8b949e" letter-spacing="1" opacity="0.2">INIT::READY</text>

  <!-- =================== BOUNCING BALLS =================== -->
  <!-- Ball 1: Yellow with Smiling Face — free bouncing via independent X/Y -->
  <g filter="url(#ballGlow)">
    <!-- Independent X motion -->
    <animateTransform attributeName="transform" type="translate"
      values="80 0; 920 0; 80 0"
      dur="7s" repeatCount="indefinite" calcMode="linear" additive="sum"/>
    <!-- Independent Y motion (incommensurate duration for non-repeating path) -->
    <animateTransform attributeName="transform" type="translate"
      values="0 60; 0 370; 0 60"
      dur="5.3s" repeatCount="indefinite" calcMode="linear" additive="sum"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="2s" repeatCount="indefinite"/>
      <!-- Ball body -->
      <circle r="22" fill="#FFD700" stroke="#FFC000" stroke-width="1.5" opacity="0.92"/>
      <!-- Eye whites -->
      <circle cx="-7" cy="-5" r="3.5" fill="white"/>
      <circle cx="7" cy="-5" r="3.5" fill="white"/>
      <!-- Pupils -->
      <circle cx="-7" cy="-5" r="1.8" fill="black"/>
      <circle cx="7" cy="-5" r="1.8" fill="black"/>
      <!-- Smile arc -->
      <path d="M-9,4 Q0,14 9,4" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Ball 2: Pink with Frowning Face — free bouncing via independent X/Y -->
  <g filter="url(#ballGlow)">
    <!-- Independent X motion -->
    <animateTransform attributeName="transform" type="translate"
      values="920 0; 80 0; 920 0"
      dur="8.3s" repeatCount="indefinite" calcMode="linear" additive="sum"/>
    <!-- Independent Y motion (incommensurate duration for non-repeating path) -->
    <animateTransform attributeName="transform" type="translate"
      values="0 370; 0 60; 0 370"
      dur="6.1s" repeatCount="indefinite" calcMode="linear" additive="sum"/>
    <g>
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="-360" dur="2.5s" repeatCount="indefinite"/>
      <!-- Ball body -->
      <circle r="22" fill="#FF69B4" stroke="#FF1493" stroke-width="1.5" opacity="0.92"/>
      <!-- Eye whites -->
      <circle cx="-7" cy="-5" r="3.5" fill="white"/>
      <circle cx="7" cy="-5" r="3.5" fill="white"/>
      <!-- Pupils -->
      <circle cx="-7" cy="-5" r="1.8" fill="black"/>
      <circle cx="7" cy="-5" r="1.8" fill="black"/>
      <!-- Frown arc -->
      <path d="M-9,10 Q0,2 9,10" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- =================== COLLISION EFFECTS (removed — balls now move freely) =================== -->

  <!-- =================== LENS FLARE =================== -->
  <rect x="0" y="200" width="1000" height="3" fill="url(#flareGrad)" opacity="0">
    <animate attributeName="opacity" values="0;0.35;0;0;0" keyTimes="0;0.08;0.16;0.5;1" dur="12s" repeatCount="indefinite" begin="4s"/>
  </rect>

  <!-- =================== CRT SCANLINE OVERLAY =================== -->
  <rect width="1000" height="420" fill="url(#scanlines)" opacity="0.6"/>

  <!-- =================== VIGNETTE OVERLAY =================== -->
  <rect width="1000" height="420" fill="url(#vignette)" opacity="0.4"/>
</svg>
