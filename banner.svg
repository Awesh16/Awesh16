<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="100%" height="100%">
  <defs>
    <clipPath id="techShape">
      <polygon points="10,60 920,0 1000,340 80,420" />
    </clipPath>

    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#techShape)">
    <rect width="100%" height="100%" fill="#0a0c10" />

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none" stroke="#1a1d21" stroke-width="1"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />

    <g opacity="0.8">
      <rect x="0" y="80" width="60" height="15" fill="#00ff41">
        <animate attributeName="x" from="-100" to="1100" dur="8s" repeatCount="indefinite" begin="0s"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="8s" repeatCount="indefinite" begin="0s"/>
      </rect>
      <rect x="0" y="160" width="120" height="15" fill="#00ff41">
        <animate attributeName="x" from="-150" to="1100" dur="6s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite" begin="1s"/>
      </rect>
       <rect x="0" y="240" width="90" height="15" fill="#00ff41">
        <animate attributeName="x" from="-120" to="1100" dur="10s" repeatCount="indefinite" begin="3s"/>
        <animate attributeName="opacity" values="0;1;1;0" dur="10s" repeatCount="indefinite" begin="3s"/>
      </rect>

      <rect x="0" y="120" width="40" height="15" fill="#ff4444">
        <animate attributeName="x" from="-100" to="1100" dur="9s" repeatCount="indefinite" begin="2s"/>
        <animate attributeName="opacity" values="0;1;0.2;1;0" dur="9s" repeatCount="indefinite" begin="2s"/>
      </rect>
       <rect x="0" y="280" width="150" height="15" fill="#ff4444">
        <animate attributeName="x" from="-200" to="1100" dur="7s" repeatCount="indefinite" begin="5s"/>
        <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" begin="5s"/>
      </rect>
    </g>
  </g>

  <g text-anchor="middle" font-family="Consolas, Monaco, 'Courier New', monospace" letter-spacing="1">
    <text x="500" y="140" font-size="38" font-weight="900" fill="#ffffff" filter="url(#greenGlow)">Md. Awesh Raza Quadri</text>
    
    <text x="500" y="195" font-size="24" font-weight="700" fill="#ff4444" filter="url(#redGlow)">// Aspiring AI &amp; ML Quant</text>
    
    <path d="M 350 240 L 650 240 L 670 250 L 330 250 Z" fill="#1a1d21" stroke="#00ff41" stroke-width="1"/>

    <text x="500" y="300" font-size="18" font-weight="500" fill="#00ff41">CSE '29 @OUTR | DS and ML '29 @IITM BS</text>
    <text x="500" y="330" font-size="16" font-style="italic" fill="#a0aab5">Focused on Competitive Programming &amp; Managing Databases</text>
  </g>

  <rect width="100%" height="100%" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.1" clip-path="url(#techShape)"/>
</svg>
