<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="45" />
    </filter>
    
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="15"/>

  <g filter="url(#blur)" opacity="0.65">
    <circle cx="200" cy="150" r="130" fill="#3b82f6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 120,-60; 0,0" dur="12s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#3b82f6; #8b5cf6; #3b82f6" dur="10s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="600" cy="150" r="150" fill="#10b981">
      <animateTransform attributeName="transform" type="translate" values="0,0; -120,60; 0,0" dur="14s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#10b981; #06b6d4; #10b981" dur="12s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="400" cy="80" r="110" fill="#8b5cf6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,120; 0,0" dur="16s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#8b5cf6; #ec4899; #8b5cf6" dur="14s" repeatCount="indefinite" />
    </circle>
  </g>

  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <text x="400" y="115" font-size="36" font-weight="800" fill="#ffffff" letter-spacing="1">Hey, I'm Md. Awesh Raza Quadri</text>
    
    <text x="400" y="165" font-size="22" font-weight="600" fill="#93c5fd">Aspiring AI &amp; ML Quant</text>
    
    <line x1="250" y1="200" x2="550" y2="200" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

    <text x="400" y="240" font-size="16" font-weight="500" fill="#e2e8f0">CSE '29 @OUTR | DS and ML '29 @IITM BS</text>
    <text x="400" y="265" font-size="15" font-style="italic" fill="#cbd5e1">Focused on Competitive Programming &amp; Managing Databases</text>
  </g>
</svg>
